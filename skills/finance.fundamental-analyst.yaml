# yaml-language-server: $schema=../docs/skill-schema.json
name: fundamental-analyst
version: 3
domain: finance
protocol_implements: [Analyzable]

description: >
  Performs fundamental financial analysis: revenue, earnings, valuation ratios,
  balance sheet health, guidance, and capital allocation. Produces a structured
  section with a Fundamental Signal at the end.

inputs:
  search_results:
    type: string
    required: true
  ticker:
    type: string
    required: false
  asset_type:
    type: string
    required: false
  context:
    type: string
    required: false
    description: Investment thesis or analytical focus for the investor

outputs_schema:
  type: string
  description: >
    Markdown analysis covering Revenue & Earnings, Profitability, Valuation, Balance Sheet,
    Guidance & Analyst Estimates, Capital Allocation, ending with:
    **Signal: OVERVALUED / FAIRLY VALUED / UNDERVALUED** — one sentence rationale.

capability_requirements:
  deep_analyst:
    needs: [deep_reasoning, financial_analysis]
    context_window_min: 16k

parameters:
  output_var: fundamental_result

implementation:
  - name: analyse
    type: llm_per_section
    model: "{{capability.deep_analyst}}"
    max_sections: "1"
    output_var: "{{parameters.output_var}}"
    section_title: "Fundamental Analysis"
    section_analysis_prompt: |
      {{ if parameters.search_results == "" }}ANALYSIS FAILURE: No search results provided for fundamental analysis. Cannot proceed.{{ end }}
      Ticker: {{parameters.ticker | string.upcase}} ({{parameters.asset_type}})
      Analyst context: {{parameters.context}}
      Date: {{date}}

      Source material:
      ---
      {{parameters.search_results}}
      ---

      {{blocks.data_integrity_rules}}

      You are a fundamental analyst. Write a focused fundamental analysis using these sub-headings.
      {{blocks.no_preamble}}

      ### Revenue & Earnings
      Most recent quarter: revenue, EPS, YoY growth, beat or miss vs consensus estimate.

      ### Profitability
      Gross, operating, and net margin — trend YoY and vs sector peers.

      ### Valuation
      P/E (TTM + forward), P/B, EV/EBITDA. Compare to sector median (cite the sector median value from sources).
      If trading at a premium, explain specifically WHY (growth rate, moat, margin advantage).
      If sector median is not in sources, write "[DATA UNAVAILABLE] — sector median P/E not found in sources".

      ### Balance Sheet
      Debt-to-equity ratio, cash & equivalents, free cash flow yield, interest coverage ratio.

      ### Guidance & Analyst Estimates
      Management full-year guidance. Analyst consensus EPS and revenue for next quarter and year.

      ### Capital Allocation
      Dividend yield and payout ratio (if applicable). Buyback authorisation and history.

      Cite specific numbers from the source material for every metric.
      If a metric is absent from sources, write "[DATA UNAVAILABLE]" (this exact marker) — do NOT estimate or use prose like "not available".

      **Signal: OVERVALUED / FAIRLY VALUED / UNDERVALUED** — one sentence rationale citing:
      (1) the specific P/E or valuation multiple, (2) the comparison baseline (sector, historical, or peer),
      and (3) what growth rate or margin justifies or contradicts the current valuation.

      ### GATE_SIGNAL
      SIGNAL: [OVERVALUED | FAIRLY_VALUED | UNDERVALUED | INSUFFICIENT_DATA]
      RATIONALE: [one sentence citing the key valuation metric and comparison baseline]
